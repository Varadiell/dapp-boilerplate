[profile.default]
solc_version = '0.8.28'
evm_version = 'cancun'
src = 'contracts'
out = "out"
libs = ["node_modules", "lib"]
test = 'test'
cache_path  = 'cache_forge'

remappings = [
  "@/contracts/=contracts/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fuzz]
runs = 50

# CI and release checks: heavier fuzzing than local default (forge test / coverage).
[profile.ci]
inherits = "default"
fuzz = { runs = 256 }
