name: Setup
description: Common environment setup

inputs:
  directory:
    description: The directory to install dependencies in (frontend / backend)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.11

    - name: Cache Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('backend/bun.lock', 'frontend/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies with Bun
      shell: bash
      run: |
        cd ${{ inputs.directory }}
        bun install --frozen-lockfile
