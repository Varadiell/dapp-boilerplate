name: Setup
description: Common environment setup

inputs:
  directory:
    description: The directory to install dependencies in (frontend / backend)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.11

    # Hardhat 3's CLI runs via `#!/usr/bin/env node`; the runner's default Node is 20.x,
    # which lacks Iterator helpers Hardhat uses (flatMap on Map iterators → Node 22+).
    - name: Setup Node.js for Hardhat / Next binaries
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('backend/bun.lock', 'frontend/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies with Bun
      shell: bash
      run: |
        cd ${{ inputs.directory }}
        bun install --frozen-lockfile
