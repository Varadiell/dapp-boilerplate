name: CI — Frontend

on:
  workflow_call:

jobs:
  frontend:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      # Third-party actions still on Node 20 until they ship node24; see GitHub Actions changelog.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      # Playwright global setup runs `bunx hardhat` in backend/; hardhat-foundry calls `forge remappings`.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Spell check (cspell)
        run: |
          cd frontend
          bun run cspell

      - name: Lint
        run: |
          cd frontend
          bun run lint

      - name: Audit (high+)
        run: |
          cd frontend
          bun audit --audit-level=high

      - name: Install Playwright (Chromium)
        run: |
          cd frontend
          bunx playwright install chromium --with-deps

      - name: End-to-end tests (Playwright)
        env:
          NEXT_PUBLIC_REOWN_PROJECT_ID: e2e-playwright-placeholder
        run: |
          cd frontend
          bun run test:e2e
