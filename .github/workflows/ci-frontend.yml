name: CI — Frontend

on:
  workflow_call:

jobs:
  frontend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      # Third-party actions still on Node 20 until they ship node24; see GitHub Actions changelog.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: CodeSpell
        uses: codespell-project/actions-codespell@v2.0
        with:
          check_hidden: true
          check_filenames: true
          skip: bun.lock,./.git/objects

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Lint
        run: |
          cd frontend
          bun run lint

      - name: Audit (high+)
        run: |
          cd frontend
          bun audit --audit-level=high
