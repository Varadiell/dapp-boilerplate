name: CI Tests

on:
  pull_request: {}
  push:
    branches: ["main", "dev"]
  workflow_dispatch: {}

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

# Three parallel jobs instead of nine: one checkout + one tool setup per lane.
# - backend: single Bun install for lint, audit, and Hardhat coverage.
# - frontend: CodeSpell first (no deps), then Bun for lint + audit.
# - backend-solidity: Foundry only (no Bun); one forge build feeds Slither then coverage.

jobs:
  backend:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Lint
        run: |
          cd backend
          bun run lint

      - name: Audit (high+)
        run: |
          cd backend
          bun audit --audit-level=high

      - name: Hardhat tests with coverage
        run: |
          cd backend
          bun run test:hardhat:coverage

      - name: Code coverage at 100% (Hardhat)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: "./backend/coverage/lcov.info"
          min_coverage: 100

  frontend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: CodeSpell
        uses: codespell-project/actions-codespell@v2.0
        with:
          check_hidden: true
          check_filenames: true
          skip: bun.lock,./.git/objects

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Lint
        run: |
          cd frontend
          bun run lint

      - name: Audit (high+)
        run: |
          cd frontend
          bun audit --audit-level=high

  backend-solidity:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Slither + ignore-compile: crytic-compile needs full build-info JSON (with "output"); add --build-info.
      # Build only src contracts (path `contracts`), not test/script — keeps Slither scope to production .sol.
      - name: Forge build
        run: |
          cd backend
          forge --version
          forge build --build-info --sizes contracts

      - name: Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "backend/contracts"
          solc-version: "0.8.24"
          slither-config: "./backend/slither.config.json"
          ignore-compile: true

      - name: Forge coverage
        run: |
          cd backend
          forge coverage -vvv --report lcov

      - name: Code coverage at 100% (Foundry)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: "./backend/lcov.info"
          min_coverage: 100
